name: pages-build

on:
  # 在 main 分支被更改时自动运行
  push:
    branches:
      - main
  # 允许手动运行
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # 从 Markdown 构建 HTML
  build:
    runs-on: ubuntu-latest

    steps:
      # 获取储存库源码
      - name: Checkout
        uses: actions/checkout@v3
      # 准备 pnpm 环境
      - name: Setup pnpm env
        uses: pnpm/action-setup@v2
        with:
          version: latest
      # 运行先前脚本
      - name: do Shell
        working-directory: src
        run: sh structure.sh
      # 生成静态文件
      - name: Build with VuePressNext
        working-directory: src
        run: pnpm docs:build; ls docs/.vuepress/dist
      # 打包静态文件并上传
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
           path: 'src/docs/.vuepress/dist'

